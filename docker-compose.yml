services:
  client-dev:
    build:
      context: ./client
      target: development
    working_dir: /app
    command: sh -c "npm install && npm run dev:host"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    profiles:
      - dev

  client-build-watch:
    build:
      context: ./client
      target: development
    working_dir: /app
    command: sh -c "npm install && npm run build:watch"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    profiles:
      - prod

  client-prod:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client-build-watch
    profiles:
      - prod

volumes:
  client_node_modules:
